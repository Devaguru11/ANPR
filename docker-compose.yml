services:
  mysql:
    image: mysql:8.0
    container_name: anpr-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: anpr_root
      MYSQL_DATABASE: aiserver
      MYSQL_USER: aiserver
      MYSQL_PASSWORD: anpr_dev
    ports:
      - "3307:3306"
    volumes:
      - anpr_mysql_data:/var/lib/mysql
      - ./server/sql/dev_bootstrap.sql:/docker-entrypoint-initdb.d/01-bootstrap.sql:ro
      - ./server/sql/assistant_chat_audit.sql:/docker-entrypoint-initdb.d/02-audit.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-panpr_root"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: anpr-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  anpr_mysql_data:
